<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>유또미의 OX 퀴즈</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <div class="topRow">
          <h1>유또미의 OX 퀴즈</h1>
          <button id="homeBtn" class="btn-icon-home hidden" type="button" aria-label="처음으로" title="처음으로">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V9.5Z" />
            </svg>
          </button>
        </div>
      </header>

      <section class="card" id="pickCard">
        <div class="pickBlock pickBlock--subject">
          <label class="label" for="subjectSelect">과목</label>
          <select id="subjectSelect" class="select"></select>
        </div>
        <div id="pickTierWrap" class="pickTierWrap hidden" aria-hidden="true">
          <div id="majorUnitRow" class="majorUnitRow">
            <label class="label" for="majorSelect">대단원</label>
            <select id="majorSelect" class="select"></select>
          </div>
        </div>
        <div class="pickUnitRow" id="pickUnitRow">
          <label class="label" for="unitSelect" id="minorLabel">단원</label>
          <select id="unitSelect" class="select"></select>
        </div>
        <button id="startBtn" class="btn btn-start" type="button">시작</button>
        <button id="wrongReviewBtn" class="btn btn-wrong-review" type="button">오답 모아보기</button>
        <p class="pickFootnote" role="note">2번 이상 맞춘 문제는 이후 출제에 나오지 않습니다.</p>
        <button id="resetMasteredBtn" class="btn-reset" type="button">맞춤 기록 초기화</button>
      </section>

      <section class="card card-quiz hidden" id="quizCard">
        <div class="meta">
          <div class="metaLeft">
            <span id="quizModeBadge" class="quizModeBadge hidden" aria-live="polite"></span>
            <span id="progress">1 / 20</span>
          </div>
          <span id="score">점수 0</span>
        </div>
        <div class="qaBox">
          <div class="qaLabel">문제</div>
          <div class="question" id="question"></div>
        </div>
        <div class="qaBox">
          <div class="qaLabel">선지</div>
          <div class="choice" id="choiceText"></div>
        </div>
        <div class="hint" id="hint"></div>
        <div class="actions">
          <button id="btnO" class="btn btn-o" type="button">O</button>
          <button id="btnX" class="btn btn-x" type="button">X</button>
        </div>
        <button id="confirmBtn" class="btn btn-confirm" type="button" disabled>다음</button>
        <button id="removeWrongBtn" class="btn-remove-wrong hidden" type="button">
          오답 목록에서 제거
        </button>
      </section>

      <section class="card hidden" id="resultCard">
        <p id="finalScore" class="result"></p>
        <button id="retryBtn" class="btn btn-retry" type="button">다시 풀기</button>
      </section>
    </main>

    <div id="resetModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="resetModalTitle" aria-hidden="true">
      <div class="modalBackdrop" data-modal-dismiss="true"></div>
      <div class="modalPanel card">
        <h2 id="resetModalTitle" class="modalTitle">맞춤 기록 초기화</h2>
        <p class="modalBody">
          이 기기에 저장된 「2번 이상 맞춤」 기록을 지웁니다. 확인을 누르면 그동안 출제에서 빠졌던 문항도 다시 나올 수 있습니다.
        </p>
        <p class="modalNote">기출에서 제외된 묶음(pack) 번호 규칙은 그대로입니다.</p>
        <div class="modalActions">
          <button id="resetModalCancel" class="btn btn-modal-secondary" type="button">취소</button>
          <button id="resetModalConfirm" class="btn btn-modal-danger" type="button">확인</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>공시생 OX 퀴즈</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <div class="topRow">
          <h1>OX 퀴즈</h1>
          <button id="homeBtn" class="btn-icon-home hidden" type="button" aria-label="처음으로" title="처음으로">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V9.5Z" />
            </svg>
          </button>
        </div>
      </header>

      <section class="card" id="pickCard">
        <label class="label" for="subjectSelect">과목</label>
        <select id="subjectSelect" class="select"></select>
        <label class="label" for="unitSelect">단원</label>
        <select id="unitSelect" class="select"></select>
        <button id="startBtn" class="btn btn-start" type="button">시작</button>
      </section>

      <section class="card card-quiz hidden" id="quizCard">
        <div class="meta">
          <span id="progress">1 / 20</span>
          <span id="score">점수 0</span>
        </div>
        <div class="qaBox">
          <div class="qaLabel">문제</div>
          <div class="question" id="question"></div>
        </div>
        <div class="qaBox">
          <div class="qaLabel">선지</div>
          <div class="choice" id="choiceText"></div>
        </div>
        <div class="hint" id="hint"></div>
        <div class="actions">
          <button id="btnO" class="btn btn-o" type="button">O</button>
          <button id="btnX" class="btn btn-x" type="button">X</button>
        </div>
        <button id="confirmBtn" class="btn btn-confirm" type="button" disabled>다음</button>
      </section>

      <section class="card hidden" id="resultCard">
        <p id="finalScore" class="result"></p>
        <button id="retryBtn" class="btn btn-retry" type="button">다시 풀기</button>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
